# version: '3.8'

services:
  backend:
    build: ./
    container_name: temp
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - QDRANT_URL=localhost
      - REDIS_HOST=localhost
      - REDIS_PORT=6379
      - COLLECTION_NAME=First
      - GEMINI_API=
      - Key=
    depends_on:
      - redis
      - qdrant
    restart: always

  redis:
    image: redis
    ports:
      - "6379:6379"
    volumes:
      - /app/redis
    restart: always
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - "/app/qdrant"
    restart: always